<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kyiv — Dining & Sights Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
  <div class="mobile-handle" onclick="toggleSidebar()">
    <div class="mobile-handle-bar"></div>
  </div>
  <div id="sidebar-header">
    <div class="eyebrow">Travel Guide · March 2026</div>
    <h1>Kyiv<br><em>Dining & Sights</em></h1>
    <div class="rate-bar">
      <span class="rate-chip">£1 = 59 UAH</span>
      <span class="rate-chip">€1 = 50 UAH</span>
    </div>
  </div>
  <div id="search-sort">
    <div class="search-wrap">
      <input type="text" id="search-box" placeholder="Search places..." oninput="applyFilters()">
    </div>
    <div id="sort-row">
      <button class="sort-btn active" onclick="setSort('default', this)">Default</button>
      <button class="sort-btn" onclick="setSort('distance', this)">Distance ↑</button>
      <button class="sort-btn" onclick="setSort('price-low', this)">Price ↑</button>
      <button class="sort-btn" onclick="setSort('name', this)">A → Z</button>
    </div>
  </div>
  <div id="filter-tabs">
    <button class="tab active" onclick="setFilter('all', this)">All</button>
    <button class="tab" onclick="setFilter('hotel', this)">🏨 Hotels</button>
    <button class="tab" onclick="setFilter('restaurant', this)">🍽 Dining</button>
    <button class="tab" onclick="setFilter('sight', this)">🏛 Sights</button>
  </div>
  <div id="itinerary-bar">
    <button id="itinerary-toggle" onclick="toggleItineraryMode()">📋 Itinerary Mode</button>
    <button id="clear-itinerary" onclick="clearItinerary()">✕ Clear</button>
  </div>
  <div id="itinerary-summary"><div class="summary-inner"><div class="summary-label">Your Route</div><div class="summary-text" id="itinerary-text"></div><a id="itinerary-gmaps-link" class="itinerary-gmaps-link" href="#" target="_blank" rel="noopener">🗺️ Open in Google Maps</a></div></div>
  <div id="place-list"></div>
</div>

<div style="position:relative; flex:1;">
  <div id="map"></div>
  <button id="sidebar-toggle" onclick="toggleSidebar()">
    <span id="toggle-icon">☰</span>
    <span class="label" id="toggle-label">Menu</span>
  </button>
  <div class="map-controls">
    <button class="map-ctrl-btn" id="homebase-label" onclick="if(homeBaseMarker&&map){map.setView(homeBaseMarker.getLatLng(),16);homeBaseMarker.openPopup();}">📍 My Base</button>
    <button class="map-ctrl-btn" id="set-homebase-btn" onclick="toggleSetHomeBase()">📍 Set Base</button>
    <button class="map-ctrl-btn" onclick="detectGPS()">◎ GPS</button>
    <button class="map-ctrl-btn" onclick="fitAllMarkers()">⊡ Fit All</button>
    <button class="map-ctrl-btn" id="style-btn" onclick="cycleMapStyle()">🗺 Light</button>
  </div>
  <div class="route-info-box" id="route-info">
    <div class="route-stat"><div class="val" id="route-distance">—</div><div class="lbl">Distance</div></div>
    <div class="route-stat"><div class="val" id="route-time">—</div><div class="lbl">Walking</div></div>
    <div class="route-stat"><div class="val" id="route-stops">—</div><div class="lbl">Stops</div></div>
    <a id="route-gmaps-btn" class="route-gmaps-btn" href="#" target="_blank" rel="noopener" title="Open in Google Maps">🗺️</a>
    <button class="route-close" onclick="clearRouteDisplay()">✕</button>
  </div>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#D4534B"></div>Hotel</div>
    <div class="legend-item"><div class="legend-dot" style="background:#C9A84C"></div>Restaurant</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2E6EA6"></div>Sight / Attraction</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a8a4a"></div>Itinerary Route</div>
  </div>
</div>


<!-- Loading overlay -->
<div id="loading-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;color:#fff;padding:24px;text-align:center;">
  <div style="font-size:32px;margin-bottom:12px;">🗺</div>
  <div id="loading-text" style="font-size:16px;font-weight:500;margin-bottom:8px;">Loading Kyiv Guide...</div>
  <div id="loading-sub" style="font-size:12px;color:rgba(255,255,255,0.5);">Fetching map library</div>
</div>

<script src="app.js"></script>
</body>
</html>
